<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | System Access</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/animations.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
    <div class="bg-grid"></div>
    <canvas id="particles-bg"></canvas>

    <!-- Theme Toggle -->
    <div class="position-fixed top-0 end-0 p-4" style="z-index: 1000;">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card scale-in">
            <div class="login-logo">
                <i class="fas fa-fingerprint glow-text"></i>
                <h2 class="glitch-text">ADMIN_AUTH</h2>
                <p class="text-secondary small mt-2">Restricted Access Portal</p>
            </div>
            
            <form id="adminLoginForm" class="form-cyber">
                <div class="mb-4">
                    <label class="form-label">Admin Email</label>
                    <div class="position-relative admin-search">
                        <i class="fas fa-envelope text-primary"></i>
                        <input type="email" class="form-control w-100" name="email" required placeholder="admin@university.edu" autocomplete="email">
                    </div>
                </div>
                
                <div class="mb-5">
                    <label class="form-label">Passkey</label>
                    <div class="position-relative admin-search">
                        <i class="fas fa-lock text-primary"></i>
                        <input type="password" class="form-control w-100" name="password" required placeholder="••••••••" autocomplete="current-password">
                    </div>
                </div>
                
                <button type="submit" id="loginBtn" class="btn-cyber w-100 mb-4">
                    INITIALIZE SECURE UPLINK <i class="fas fa-arrow-right ms-2"></i>
                </button>
                
                <div class="text-center">
                    <a href="/" class="text-muted small text-decoration-none hover-cyan">
                        <i class="fas fa-long-arrow-alt-left me-1"></i> Return to Public Interface
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/animations.js"></script>
    <script src="/assets/js/admin.js"></script>
</body>
</html>
