<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body class="bg-dark">
    <div class="admin-layout">
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-microchip fs-4 text-cyan"></i>
                <div class="sidebar-logo">ADMIN_SYS</div>
            </div>
            <div class="sidebar-nav">
                <div class="sidebar-section-title">Core</div>
                <a href="/admin/dashboard" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <div class="sidebar-section-title">System</div>
                <a href="/admin/security" class="sidebar-link active"><i class="fas fa-shield-alt"></i> Security</a>
                <a href="/admin/settings" class="sidebar-link"><i class="fas fa-cog"></i> Settings</a>
            </div>
        </aside>

        <main class="admin-content">
            <header class="admin-topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="sidebar-toggle d-none d-lg-flex" type="button"><i class="fas fa-bars"></i></button>
                    <h1 class="mb-0 text-success">SECURITY CENTER</h1>
                </div>
            </header>

            <div class="card-cyber text-center py-5 fade-in-up">
                <i class="fas fa-shield-virus fs-1 text-success mb-3 glitch"></i>
                <h3 class="font-orbitron text-success">SYSTEM SECURE</h3>
                <p class="text-secondary">XSS, CSRF, and Rate Limiting protections are actively monitoring all endpoints.</p>
                <div class="mt-4 border border-success p-3 rounded d-inline-block text-start">
                    <div class="text-success small mb-1"><i class="fas fa-check-circle me-2"></i> Helmet JS Active</div>
                    <div class="text-success small mb-1"><i class="fas fa-check-circle me-2"></i> MongoDB Sanitization Active</div>
                    <div class="text-success small"><i class="fas fa-check-circle me-2"></i> Rate Limiter Configured</div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/admin.js"></script>
</body>
</html>
