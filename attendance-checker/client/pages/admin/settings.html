<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body class="bg-dark">
    <div class="admin-layout">
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-microchip fs-4 text-cyan"></i>
                <div class="sidebar-logo">ADMIN_SYS</div>
            </div>
            <div class="sidebar-nav">
                <div class="sidebar-section-title">Core</div>
                <a href="/admin/dashboard" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <div class="sidebar-section-title">Config</div>
                <a href="/admin/settings" class="sidebar-link active"><i class="fas fa-cog"></i> Settings</a>
                <a href="/admin/backup" class="sidebar-link"><i class="fas fa-database"></i> Backup</a>
            </div>
        </aside>

        <main class="admin-content">
            <header class="admin-topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="sidebar-toggle d-none d-lg-flex" type="button"><i class="fas fa-bars"></i></button>
                    <h1 class="mb-0">SYSTEM SETTINGS</h1>
                </div>
            </header>

            <div class="row g-4">
                <div class="col-md-6 fade-in-up">
                    <div class="card-cyber">
                        <h3 class="font-orbitron text-primary mb-4 border-bottom border-cyber pb-2">Global Configuration</h3>
                        <form class="form-cyber">
                            <div class="mb-3">
                                <label class="form-label">System Name</label>
                                <input type="text" class="form-control" value="University Student Attendance Checker">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Minimum Attendance %</label>
                                <input type="number" class="form-control" value="75">
                            </div>
                            <button type="button" class="btn-cyber w-100">SAVE CONFIGURATION</button>
                        </form>
                    </div>
                </div>
                <div class="col-md-6 fade-in-up stagger-1">
                    <div class="card-cyber">
                        <h3 class="font-orbitron text-primary mb-4 border-bottom border-cyber pb-2">Admin Profile</h3>
                        <form class="form-cyber">
                            <div class="mb-3">
                                <label class="form-label">Update Email</label>
                                <input type="email" class="form-control" placeholder="admin@university.edu">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <input type="password" class="form-control">
                            </div>
                            <button type="button" class="btn-cyber-outline w-100">UPDATE CREDENTIALS</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/admin.js"></script>
</body>
</html>
