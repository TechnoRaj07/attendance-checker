<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitors | Admin Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body class="bg-dark">
    <!-- Admin Layout -->
    <div class="admin-layout">
        
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-microchip fs-4 text-cyan"></i>
                <div class="sidebar-logo">ADMIN_SYS</div>
            </div>
            
            <div class="sidebar-nav">
                <div class="sidebar-section-title">Core</div>
                <a href="/admin/dashboard" class="sidebar-link">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="/admin/records" class="sidebar-link">
                    <i class="fas fa-file-contract"></i> Records
                </a>
                <a href="/admin/visitors" class="sidebar-link active">
                    <i class="fas fa-users"></i> Visitors
                </a>
                
                <div class="sidebar-section-title">Data</div>
                <a href="/admin/analytics" class="sidebar-link">
                    <i class="fas fa-chart-pie"></i> Analytics
                </a>
                <a href="/admin/messages" class="sidebar-link">
                    <i class="fas fa-envelope"></i> Messages
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <!-- Topbar -->
            <header class="admin-topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="sidebar-toggle d-none d-lg-flex" type="button"><i class="fas fa-bars"></i></button>
                    <h1 class="mb-0">VISITOR LOGS</h1>
                </div>
                
                <div class="admin-topbar-actions">
                    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme"><i class="fas fa-moon"></i></button>
                </div>
            </header>

            <!-- Toolbar -->
            <div class="row mb-4 align-items-center">
                <div class="col-md-6 mb-3 mb-md-0">
                    <div class="admin-search w-100">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchVisitorInput" class="form-control" placeholder="Search by IP, ID, or location...">
                    </div>
                </div>
                <div class="col-md-6 text-md-end">
                    <button class="btn-cyber-outline py-2 px-3" onclick="utils.downloadCSV('visitors')">
                        <i class="fas fa-file-csv me-2"></i> Export Logs (CSV)
                    </button>
                </div>
            </div>

            <!-- Table -->
            <div class="data-table-wrapper fade-in-up stagger-1">
                <div class="data-table-header">
                    <div class="data-table-title"><i class="fas fa-eye me-2"></i> Real-time Tracking</div>
                    <div class="text-muted small">Total: <span id="visitorsTotal" class="text-primary font-orbitron">0</span></div>
                </div>
                <div class="table-responsive-cyber">
                    <table class="table-cyber">
                        <thead>
                            <tr>
                                <th>Visitor Info</th>
                                <th>IP Address</th>
                                <th>Location</th>
                                <th>Browser</th>
                                <th>Device</th>
                                <th>Last Visit</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="visitorsTableBody">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
                <div class="pagination-cyber" id="visitorsPagination">
                    <!-- Pagination Injected by JS -->
                </div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/admin.js"></script>
</body>
</html>
