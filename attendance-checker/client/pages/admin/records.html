<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Records | Admin Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body class="bg-dark">
    <!-- Admin Layout -->
    <div class="admin-layout">
        
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-microchip fs-4 text-cyan"></i>
                <div class="sidebar-logo">ADMIN_SYS</div>
                <button class="sidebar-toggle d-lg-none" type="button">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="sidebar-nav">
                <div class="sidebar-section-title">Core</div>
                <a href="/admin/dashboard" class="sidebar-link">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="/admin/records" class="sidebar-link active">
                    <i class="fas fa-file-contract"></i> Records
                </a>
                <a href="/admin/visitors" class="sidebar-link">
                    <i class="fas fa-users"></i> Visitors
                </a>
                
                <div class="sidebar-section-title">Data</div>
                <a href="/admin/analytics" class="sidebar-link">
                    <i class="fas fa-chart-pie"></i> Analytics
                </a>
                <a href="/admin/messages" class="sidebar-link">
                    <i class="fas fa-envelope"></i> Messages
                </a>
                
                <div class="sidebar-section-title">System</div>
                <a href="/admin/users" class="sidebar-link">
                    <i class="fas fa-user-shield"></i> Users
                </a>
                <a href="/admin/security" class="sidebar-link">
                    <i class="fas fa-shield-alt"></i> Security
                </a>
                <a href="/admin/logs" class="sidebar-link">
                    <i class="fas fa-clipboard-list"></i> Activity Logs
                </a>
                
                <div class="sidebar-section-title">Config</div>
                <a href="/admin/settings" class="sidebar-link">
                    <i class="fas fa-cog"></i> Settings
                </a>
                <a href="/admin/backup" class="sidebar-link">
                    <i class="fas fa-database"></i> Backup
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <!-- Topbar -->
            <header class="admin-topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="sidebar-toggle d-none d-lg-flex" type="button">
                        <i class="fas fa-bars"></i>
                    </button>
                    <button class="sidebar-toggle d-lg-none" type="button">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="mb-0">ATTENDANCE RECORDS</h1>
                </div>
                
                <div class="admin-topbar-actions">
                    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div class="dropdown">
                        <div class="admin-profile" data-bs-toggle="dropdown">
                            <div class="admin-avatar" id="adminAvatarTxt">A</div>
                            <div class="d-none d-md-block">
                                <div class="fw-bold text-primary small" id="adminNameTxt">Admin</div>
                            </div>
                        </div>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark bg-cyber border-cyber mt-2">
                            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
                        </ul>
                    </div>
                </div>
            </header>

            <!-- Toolbar -->
            <div class="row mb-4 align-items-center">
                <div class="col-md-6 mb-3 mb-md-0 d-flex gap-3">
                    <div class="admin-search flex-grow-1">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" class="form-control" placeholder="Search by name, roll, or department...">
                    </div>
                    <select id="filterSelect" class="form-select border-cyber bg-cyber text-primary" style="width: auto;">
                        <option value="">All Status</option>
                        <option value="PASS">Passed (>= 75%)</option>
                        <option value="SHORT">Short (< 75%)</option>
                    </select>
                </div>
                <div class="col-md-6 text-md-end">
                    <button class="btn-cyber-outline py-2 px-3" onclick="utils.downloadCSV('attendance')">
                        <i class="fas fa-file-csv me-2"></i> Export CSV
                    </button>
                    <button class="btn-cyber py-2 px-3 ms-2" onclick="utils.downloadExcel()">
                        <i class="fas fa-file-excel me-2"></i> Export Excel
                    </button>
                </div>
            </div>

            <!-- Table -->
            <div class="data-table-wrapper fade-in-up stagger-1">
                <div class="data-table-header">
                    <div class="data-table-title"><i class="fas fa-list me-2"></i> Calculation History</div>
                    <div class="text-muted small">Total: <span id="recordsTotal" class="text-primary font-orbitron">0</span></div>
                </div>
                <div class="table-responsive-cyber">
                    <table class="table-cyber">
                        <thead>
                            <tr>
                                <th>Student Info</th>
                                <th>Department</th>
                                <th>Total Classes</th>
                                <th>Attended</th>
                                <th>Percentage</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTableBody">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
                <div class="pagination-cyber" id="recordsPagination">
                    <!-- Pagination Injected by JS -->
                </div>
            </div>

        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/admin.js"></script>
</body>
</html>
