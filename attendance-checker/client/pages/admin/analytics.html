<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | Admin Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-dark">
    <!-- Admin Layout -->
    <div class="admin-layout">
        
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-microchip fs-4 text-cyan"></i>
                <div class="sidebar-logo">ADMIN_SYS</div>
            </div>
            
            <div class="sidebar-nav">
                <div class="sidebar-section-title">Core</div>
                <a href="/admin/dashboard" class="sidebar-link">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="/admin/records" class="sidebar-link">
                    <i class="fas fa-file-contract"></i> Records
                </a>
                <a href="/admin/visitors" class="sidebar-link">
                    <i class="fas fa-users"></i> Visitors
                </a>
                
                <div class="sidebar-section-title">Data</div>
                <a href="/admin/analytics" class="sidebar-link active">
                    <i class="fas fa-chart-pie"></i> Analytics
                </a>
                <a href="/admin/messages" class="sidebar-link">
                    <i class="fas fa-envelope"></i> Messages
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <header class="admin-topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="sidebar-toggle d-none d-lg-flex" type="button"><i class="fas fa-bars"></i></button>
                    <h1 class="mb-0">DEEP ANALYTICS</h1>
                </div>
            </header>

            <div class="row g-4 mb-4">
                <div class="col-md-6 fade-in-up stagger-1">
                    <div class="chart-card h-100">
                        <h3 class="chart-card-title">Monthly Visitor Trends</h3>
                        <div style="height: 300px;">
                            <canvas id="monthlyVisitorsChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 fade-in-up stagger-2">
                    <div class="chart-card h-100">
                        <h3 class="chart-card-title">Department Distribution</h3>
                        <div style="height: 300px;">
                            <canvas id="deptChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 fade-in-up stagger-3">
                    <div class="chart-card h-100">
                        <h3 class="chart-card-title">Device Usage Matrix</h3>
                        <div style="height: 300px; display: flex; align-items: center; justify-content: center;">
                            <canvas id="deviceChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/admin.js"></script>
    <script src="/assets/js/charts.js"></script>
</body>
</html>
