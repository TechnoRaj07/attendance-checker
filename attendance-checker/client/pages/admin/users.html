<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body class="bg-dark">
    <div class="admin-layout">
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-microchip fs-4 text-cyan"></i>
                <div class="sidebar-logo">ADMIN_SYS</div>
            </div>
            <div class="sidebar-nav">
                <div class="sidebar-section-title">Core</div>
                <a href="/admin/dashboard" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin/records" class="sidebar-link"><i class="fas fa-file-contract"></i> Records</a>
                <a href="/admin/visitors" class="sidebar-link"><i class="fas fa-users"></i> Visitors</a>
                <div class="sidebar-section-title">System</div>
                <a href="/admin/users" class="sidebar-link active"><i class="fas fa-user-shield"></i> Users</a>
                <a href="/admin/security" class="sidebar-link"><i class="fas fa-shield-alt"></i> Security</a>
                <a href="/admin/settings" class="sidebar-link"><i class="fas fa-cog"></i> Settings</a>
            </div>
        </aside>

        <main class="admin-content">
            <header class="admin-topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="sidebar-toggle d-none d-lg-flex" type="button"><i class="fas fa-bars"></i></button>
                    <h1 class="mb-0">USER MANAGEMENT</h1>
                </div>
            </header>

            <div class="card-cyber text-center py-5 fade-in-up">
                <i class="fas fa-tools fs-1 text-primary mb-3 glitch"></i>
                <h3 class="font-orbitron text-primary">MODULE IN DEVELOPMENT</h3>
                <p class="text-secondary">The User Management module is being upgraded to Enterprise v5.1.</p>
                <a href="/admin/dashboard" class="btn-cyber mt-3">RETURN TO DASHBOARD</a>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/admin.js"></script>
</body>
</html>
